<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>广金网 - 网站导航</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: #e8e8e4;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.10), 0 8px 32px rgba(0,0,0,0.06);
      --radius: 12px;
    }

    body {
      font-family: 'Noto Sans SC', 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    /* ── Search ── */
    .search-wrap {
      padding: 48px 24px 32px;
      text-align: center;
    }
    .search-wrap h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .search-wrap p {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 24px;
    }
    .search-box {
      display: flex;
      max-width: 560px;
      margin: 0 auto;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 20px;
      font-size: 15px;
      font-family: inherit;
      background: transparent;
      color: var(--text-primary);
    }
    .search-box button {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .search-box button:hover { background: #1d4ed8; }

    /* ── Main ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ── Section ── */
    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-secondary);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
      border-color: #d0d0cc;
    }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .card-info { min-width: 0; }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-secondary);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .section { animation: fadeUp 0.4s ease both; }
    .section:nth-child(1) { animation-delay: 0.05s; }
    .section:nth-child(2) { animation-delay: 0.10s; }
    .section:nth-child(3) { animation-delay: 0.15s; }
    .section:nth-child(4) { animation-delay: 0.20s; }
    .section:nth-child(5) { animation-delay: 0.25s; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .search-wrap h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">广<span>金</span>网</div>
    <span style="font-size:13px;color:var(--text-secondary);">网站导航</span>
  </div>
</header>

<div class="search-wrap">
  <h1>广金网导航</h1>
  <p>发现优质网站，高效上网</p>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索网站或直接输入网址..." />
    <button onclick="doSearch()">搜索</button>
  </div>
</div>

<main id="main"></main>

<footer>© 2026 广金网 · 简洁 · 高效 · 导航</footer>

<script>
  const data = [
    {
      category: "🔍 搜索引擎",
      sites: [
        { name: "百度", desc: "国内最大搜索引擎", icon: "🔵", bg: "#eff6ff", url: "https://www.baidu.com" },
        { name: "Google", desc: "全球搜索引擎", icon: "🌐", bg: "#f0fdf4", url: "https://www.google.com" },
        { name: "必应", desc: "微软搜索引擎", icon: "🟦", bg: "#f0f9ff", url: "https://www.bing.com" },
        { name: "搜狗", desc: "微信内容搜索", icon: "🟠", bg: "#fff7ed", url: "https://www.sogou.com" },
      ]
    },
    {
      category: "📰 新闻资讯",
      sites: [
        { name: "新浪新闻", desc: "实时热点资讯", icon: "📡", bg: "#fef2f2", url: "https://news.sina.com.cn" },
        { name: "腾讯新闻", desc: "权威新闻平台", icon: "🐧", bg: "#eff6ff", url: "https://news.qq.com" },
        { name: "网易新闻", desc: "有态度的新闻", icon: "🎯", bg: "#fdf4ff", url: "https://news.163.com" },
        { name: "澎湃新闻", desc: "深度新闻报道", icon: "💧", bg: "#f0f9ff", url: "https://www.thepaper.cn" },
      ]
    },
    {
      category: "💼 金融财经",
      sites: [
        { name: "东方财富", desc: "股票行情数据", icon: "📈", bg: "#f0fdf4", url: "https://www.eastmoney.com" },
        { name: "同花顺", desc: "炒股必备工具", icon: "💹", bg: "#eff6ff", url: "https://www.10jqka.com.cn" },
        { name: "雪球", desc: "投资社区平台", icon: "⛄", bg: "#f0f9ff", url: "https://xueqiu.com" },
        { name: "财联社", desc: "财经电报资讯", icon: "📊", bg: "#fff7ed", url: "https://www.cls.cn" },
      ]
    },
    {
      category: "🛒 购物电商",
      sites: [
        { name: "淘宝", desc: "网购首选平台", icon: "🛍️", bg: "#fff7ed", url: "https://www.taobao.com" },
        { name: "京东", desc: "正品快速配送", icon: "🔴", bg: "#fef2f2", url: "https://www.jd.com" },
        { name: "拼多多", desc: "超低价购物", icon: "🟠", bg: "#fff7ed", url: "https://www.pinduoduo.com" },
        { name: "天猫", desc: "品牌旗舰店", icon: "🐱", bg: "#fdf4ff", url: "https://www.tmall.com" },
      ]
    },
    {
      category: "🎬 视频娱乐",
      sites: [
        { name: "哔哩哔哩", desc: "年轻人的视频社区", icon: "📺", bg: "#fdf4ff", url: "https://www.bilibili.com" },
        { name: "优酷", desc: "正版高清视频", icon: "🎞️", bg: "#fff7ed", url: "https://www.youku.com" },
        { name: "爱奇艺", desc: "热门影视剧集", icon: "🎬", bg: "#fef2f2", url: "https://www.iqiyi.com" },
        { name: "腾讯视频", desc: "独家影视内容", icon: "🎥", bg: "#eff6ff", url: "https://v.qq.com" },
      ]
    },
    {
      category: "🛠️ 实用工具",
      sites: [
        { name: "GitHub", desc: "代码托管平台", icon: "🐙", bg: "#f8f8f8", url: "https://github.com" },
        { name: "语雀", desc: "知识管理工具", icon: "📝", bg: "#f0fdf4", url: "https://www.yuque.com" },
        { name: "ProcessOn", desc: "在线流程图", icon: "🗂️", bg: "#eff6ff", url: "https://www.processon.com" },
        { name: "即时设计", desc: "在线UI设计", icon: "🎨", bg: "#fdf4ff", url: "https://js.design" },
      ]
    },
  ];

  function render(filter = '') {
    const main = document.getElementById('main');
    const lower = filter.toLowerCase();
    let html = '';
    data.forEach(section => {
      const sites = filter
        ? section.sites.filter(s => s.name.includes(filter) || s.desc.includes(filter))
        : section.sites;
      if (!sites.length) return;
      html += `<div class="section">
        <div class="section-title">${section.category}</div>
        <div class="grid">`;
      sites.forEach(s => {
        html += `<a class="card" href="${s.url}" target="_blank" rel="noopener">
          <div class="card-icon" style="background:${s.bg}">${s.icon}</div>
          <div class="card-info">
            <div class="card-name">${s.name}</div>
            <div class="card-desc">${s.desc}</div>
          </div>
        </a>`;
      });
      html += `</div></div>`;
    });
    main.innerHTML = html || '<p style="text-align:center;color:#999;padding:40px">没有找到相关网站</p>';
  }

  function doSearch() {
    const val = document.getElementById('searchInput').value.trim();
    if (!val) { render(); return; }
    // If looks like URL, open directly
    if (val.startsWith('http') || val.includes('.com') || val.includes('.cn')) {
      const url = val.startsWith('http') ? val : 'https://' + val;
      window.open(url, '_blank'); return;
    }
    render(val);
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  render();
</script>
</body>
</html>
